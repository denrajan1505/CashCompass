<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" fill="#0f172a" stroke="#6366f1" stroke-width="2.5"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="22" fill="#1e293b" stroke="#4f46e5" stroke-width="1.5"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#818cf8"/>
  <!-- North needle (purple) -->
  <polygon points="32,10 29,32 32,29 35,32" fill="#6366f1"/>
  <!-- South needle (slate) -->
  <polygon points="32,54 29,32 32,35 35,32" fill="#475569"/>
  <!-- East needle (slate) -->
  <polygon points="54,32 32,29 35,32 32,35" fill="#475569"/>
  <!-- West needle (slate) -->
  <polygon points="10,32 32,29 29,32 32,35" fill="#334155"/>
  <!-- N label -->
  <text x="32" y="8" text-anchor="middle" font-family="Inter,sans-serif" font-size="6" font-weight="700" fill="#a5b4fc">N</text>
  <!-- Cardinal tick marks -->
  <line x1="32" y1="3" x2="32" y2="7" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="57" x2="32" y2="61" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="3" y1="32" x2="7" y2="32" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="57" y1="32" x2="61" y2="32" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
</svg>
